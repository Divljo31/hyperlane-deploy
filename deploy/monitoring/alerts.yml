# Prometheus alert rules covering the README.md Phase 6 monitoring checklist.
#
# NOTE: metric names below match the agents-v2.x /metrics output; VERIFY against your running agents
# (curl the --metrics-port endpoint) and adjust label names/thresholds before relying on them.
# Common Hyperlane metrics: hyperlane_wallet_balance, hyperlane_latest_checkpoint,
# hyperlane_submitter_queue_length, hyperlane_contract_sync_block_height.
groups:
  - name: hyperlane
    rules:
      # --- Agent liveness (must come first: every rule below returns NO data — and fires
      # --- nothing — when an agent is dead or unscrapeable; only `up` catches that) ---
      - alert: HyperlaneAgentDown
        expr: up == 0
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Hyperlane agent down: {{ $labels.job }} {{ $labels.instance }}"
          description: "Target unscrapeable for 5m — container dead, port unreachable, or network broken."

      # --- Gas balances (validator + relayer EOAs, per chain) ---
      - alert: HyperlaneRelayerLowGasBalance
        expr: hyperlane_wallet_balance{wallet_name="relayer"} < 0.05
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "Relayer gas balance low on {{ $labels.chain }}"
          description: "Relayer EOA balance is {{ $value }} on {{ $labels.chain }}; top up before deliveries stall."

      - alert: HyperlaneValidatorLowGasBalance
        expr: hyperlane_wallet_balance{wallet_name="validator"} < 0.02
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: "Validator gas balance low on {{ $labels.chain }}"

      # --- Validator checkpoint freshness (processed must keep up with observed) ---
      # Guarded on observed>0 so quiet periods with no new dispatches don't page:
      # validator_processed only advances when messages actually flow.
      - alert: HyperlaneValidatorCheckpointStalled
        expr: >
          increase(hyperlane_latest_checkpoint{phase="validator_observed"}[15m]) > 0
          and increase(hyperlane_latest_checkpoint{phase="validator_processed"}[15m]) == 0
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: "Validator checkpoints stalled on {{ $labels.chain }}"
          description: "Checkpoints observed but none signed in 15m — validator hung or RPC/finality issue."

      # --- Relayer delivery backlog (Mailbox dispatched - processed) ---
      - alert: HyperlaneRelayerQueueBacklog
        expr: hyperlane_submitter_queue_length > 50
        for: 10m
        labels: { severity: warning }
        annotations:
          # metric labels: remote/queue_name/operation_status — there is no `chain` label here
          summary: "Relayer submit queue backing up on {{ $labels.remote }}"

      # --- RPC / indexer health (sync height must keep advancing) ---
      - alert: HyperlaneChainSyncStalled
        expr: increase(hyperlane_contract_sync_block_height[10m]) == 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Chain sync stalled on {{ $labels.chain }}"
          description: "Block height not advancing — likely a flaky/failed RPC; check customRpcUrls fallbacks."
